name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux x64 binary
        run: |
          bun run build:binary
          mv dist/pacman-tui dist/pacman-tui-linux-x64
          chmod +x dist/pacman-tui-linux-x64

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pacman-tui-linux-x64
